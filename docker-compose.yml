services:
  dicomium:
    # The published multi-arch image (amd64 + arm64), so `docker compose up -d` just pulls
    # and runs — no build toolchain, no Node, no Python needed on the host.
    #
    # To build from source instead (for development, or to run a local change):
    #     docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
    image: acaranta/dicomium:latest
    container_name: dicomium
    ports:
      - "8080:8080"
    volumes:
      # The SQLite index, thumbnails and the session secret.
      - ./data:/data
      # The DICOM store. Point this at a real disk: one exam DVD is ~600 MB.
      - ./dicomfiles:/dicomfiles
    environment:
      TZ: Europe/Paris
      LOG_LEVEL: INFO

      # --- Accounts ---
      # The first account to register becomes the administrator. Flip this to "false"
      # once your users exist to close the instance to new signups. A zero-user instance
      # stays claimable regardless, so this cannot brick a fresh deployment.
      REGISTRATION_ENABLED: "true"
      SESSION_TTL_HOURS: "168"
      # Set to "true" when serving over HTTPS, so the session cookie is marked Secure.
      COOKIE_SECURE: "false"

      # Optional: pre-create an admin instead of self-registering.
      # ADMIN_EMAIL: you@example.com
      # ADMIN_PASSWORD: change-me-at-least-12-chars

      # --- Multi-factor authentication ---
      # Users opt in per account from /account: a passkey (which signs them in on its own,
      # with no password) and/or an authenticator app with recovery codes.
      #
      # The label an authenticator app shows next to the code.
      TOTP_ISSUER: DICOMium
      #
      # Passkeys are bound to a domain (the WebAuthn "Relying Party ID"). Left unset, it is
      # derived from the request, so passkeys work at localhost:8080 and behind a reverse
      # proxy on any domain with no configuration. Pin them if you want to be explicit:
      # WEBAUTHN_RP_ID: dicomium.example.com
      # WEBAUTHN_ORIGIN: https://dicomium.example.com
      #
      # NOTE: browsers only allow passkeys in a secure context — HTTPS, or localhost. They
      # will NOT work over plain HTTP on a LAN address (http://192.168.x.x:8080), whatever
      # you set above. Password + authenticator app work everywhere.

      # --- Ingest limits ---
      # A burned exam DVD is typically 300-700 MB compressed.
      MAX_UPLOAD_MB: "8192"
      # Zip-bomb guard: the most a single archive may expand to.
      MAX_EXTRACT_MB: "20480"

      # --- DICOMweb ---
      # auto   pass compressed frames (JPEG, JPEG-LS, JPEG 2000, HTJ2K, RLE) straight to
      #        the browser's wasm decoders — zero server CPU. Decode server-side only for
      #        the syntaxes the browser cannot handle.
      # always always decode server-side.
      # never  never decode; unsupported syntaxes fail instead of burning CPU.
      DICOMWEB_TRANSCODE: auto
    restart: unless-stopped
