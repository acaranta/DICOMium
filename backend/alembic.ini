# Alembic configuration.
#
# The database URL is NOT set here: it is derived from the app's own settings (DATA_DIR) in
# migrations/env.py, so there is exactly one place that decides where the database lives.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = [ALEMBIC] %(levelname)-5.5s %(message)s
