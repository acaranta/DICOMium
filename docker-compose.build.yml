# Build from source instead of pulling the published image.
#
#     docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
#
# Everything else — ports, volumes, environment — comes from docker-compose.yml, so there is
# still exactly one place to configure the app.
services:
  dicomium:
    build: .
    # Overrides the acaranta/dicomium:latest tag from the base file, so a local build can
    # never be mistaken for (or accidentally overwrite) the published one.
    image: dicomium:local
