server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /app/frontend/dist;
    index index.html;

    # DICOM uploads are whole burned DVDs. Do not cap them, and do not let nginx
    # buffer a multi-GB body to its own temp dir before forwarding it.
    client_max_body_size 0;

    # nginx runs as a non-root uid here, so every scratch path must be writable by it.
    client_body_temp_path /tmp/nginx-body;
    proxy_temp_path /tmp/nginx-proxy;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/dicom+json text/css application/javascript
               text/javascript image/svg+xml;

    # A 400-slice CT series is ~4.5 MB of DICOM JSON; gzip takes it to a few hundred KB.
    location /dicomweb/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Frame responses are binary multipart; buffering them adds latency for no gain.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /api/uploads {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # nginx's stock mime.types has no entry for .webmanifest, so it would go out as
    # application/octet-stream and browsers would decline to install the PWA.
    location = /site.webmanifest {
        default_type application/manifest+json;
        expires 7d;
    }

    # Icons change only when the brand does.
    location ~* \.(?:ico|png|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
